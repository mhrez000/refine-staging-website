<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Refine Staging</title>
    <script>
      // GitHub Pages SPA redirect — preserves the path so the SPA router can pick it up.
      // Adapted from https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // /refine-staging-website/  → keep 1 segment
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
